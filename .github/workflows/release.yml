name: Build & Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 这样的 tag 时触发

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Build frontend
        run: cd frontend && npm ci --legacy-peer-deps && npm run build

      - name: Build Python backend
        run: |
          pip install pyinstaller
          pyinstaller --onedir --name backend \
            --add-data "platforms:platforms" \
            --add-data "core:core" \
            --add-data "api:api" \
            --add-data "services:services" \
            --add-data "static:static" \
            --collect-all browserforge \
            --collect-all camoufox \
            --collect-all apify_fingerprint_datapoints \
            --collect-all language_tags \
            --collect-all ua_parser \
            --collect-all ua_parser_builtins \
            main.py
          mkdir -p electron/backend
          cp -r dist/backend electron/backend/

      - name: Build Electron (macOS)
        run: |
          cd electron
          npm ci --legacy-peer-deps
          npm run build:mac
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Build frontend
        run: cd frontend && npm ci --legacy-peer-deps && npm run build

      - name: Build Python backend
        run: |
          pip install pyinstaller
          pyinstaller --onedir --name backend `
            --add-data "platforms;platforms" `
            --add-data "core;core" `
            --add-data "api;api" `
            --add-data "services;services" `
            --add-data "static;static" `
            --collect-all browserforge `
            --collect-all camoufox `
            --collect-all apify_fingerprint_datapoints `
            --collect-all language_tags `
            --collect-all ua_parser `
            --collect-all ua_parser_builtins `
            main.py
          New-Item -ItemType Directory -Force -Path electron/backend
          Copy-Item -Recurse dist/backend electron/backend/
        shell: pwsh

      - name: Build Electron (Windows)
        run: |
          cd electron
          npm ci --legacy-peer-deps
          npm run build:win
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: electron/dist/*.exe
          if-no-files-found: error

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS builds
        uses: actions/download-artifact@v4
        with:
          name: mac-builds
          path: dist/

      - name: Download Windows builds
        uses: actions/download-artifact@v4
        with:
          name: win-builds
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
